name: Release and Publish Documentation

concurrency:
  group: release
  cancel-in-progress: true
  
permissions:
  contents: write
  pages: write
  id-token: write
  
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
  push:
    branches:
      - 'release/*'
jobs:
  build-and-publish:
    name: Build and Publish Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push to gh-pages branch
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # for hugo to get git info

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FULL_VERSION=${{ github.event.inputs.version }}
          else
            FULL_VERSION=${GITHUB_REF_NAME#release/}
          fi
          
          # Validate version format
          if ! [[ "$FULL_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format: $FULL_VERSION"
            exit 1
          fi
          
          MINOR_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1,2)
          echo "Final version: ${FULL_VERSION}"
          echo "Minor version: ${MINOR_VERSION}"
          echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "minor_version=${MINOR_VERSION}" >> $GITHUB_OUTPUT
          
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@v3
        with:
          path: resources
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/config.*') }}

      - name: Build website
        run: |
          hugo --minify
          if [ ! -d "public" ]; then
            echo "Error: Hugo build produced no output"
            exit 1
          fi
    
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: manual/${{ steps.get_version.outputs.minor_version }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: publish website for ${{ steps.get_version.outputs.version }}'
